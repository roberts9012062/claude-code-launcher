<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="btnLaunch" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="btnAdd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="btnDelete" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1e1e2e"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="50" fill="url(#headerGrad)"/>
  <text x="400" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Claude Code Multi-Model Launcher</text>

  <!-- Model List Container -->
  <rect x="20" y="70" width="760" height="320" fill="#181825" rx="5" stroke="#3b82f6" stroke-width="2"/>

  <!-- Model Item 1 - Selected -->
  <rect x="25" y="80" width="750" height="40" fill="#3b82f6" rx="3"/>
  <text x="40" y="106" font-family="Consolas, monospace" font-size="14" fill="white">
    <tspan font-weight="bold">GLM</tspan>
    <tspan fill="#a0a0a0"> - glm-4.6</tspan>
  </text>

  <!-- Model Item 2 -->
  <rect x="25" y="130" width="750" height="40" fill="#1e1e2e" rx="3"/>
  <text x="40" y="156" font-family="Consolas, monospace" font-size="14" fill="#c0c0c0">
    <tspan font-weight="bold">MiniMax</tspan>
    <tspan fill="#808080"> - MiniMax-M2.5</tspan>
  </text>

  <!-- Model Item 3 -->
  <rect x="25" y="180" width="750" height="40" fill="#1e1e2e" rx="3"/>
  <text x="40" y="206" font-family="Consolas, monospace" font-size="14" fill="#c0c0c0">
    <tspan font-weight="bold">DeepSeek</tspan>
    <tspan fill="#808080"> - DeepSeek-V3.2-Exp</tspan>
  </text>

  <!-- Model Item 4 -->
  <rect x="25" y="230" width="750" height="40" fill="#1e1e2e" rx="3"/>
  <text x="40" y="256" font-family="Consolas, monospace" font-size="14" fill="#c0c0c0">
    <tspan font-weight="bold">Kimi</tspan>
    <tspan fill="#808080"> - kimi-k2-turbo-preview</tspan>
  </text>

  <!-- Model Item 5 -->
  <rect x="25" y="280" width="750" height="40" fill="#1e1e2e" rx="3"/>
  <text x="40" y="306" font-family="Consolas, monospace" font-size="14" fill="#c0c0c0">
    <tspan font-weight="bold">Qwen</tspan>
    <tspan fill="#808080"> - qwen3-max</tspan>
  </text>

  <!-- Model Item 6 -->
  <rect x="25" y="330" width="750" height="40" fill="#1e1e2e" rx="3"/>
  <text x="40" y="356" font-family="Consolas, monospace" font-size="14" fill="#c0c0c0">
    <tspan font-weight="bold">OpenAI</tspan>
    <tspan fill="#808080"> - gpt-4o</tspan>
  </text>

  <!-- Buttons -->
  <rect x="140" y="410" width="100" height="35" fill="url(#btnLaunch)" rx="5"/>
  <text x="190" y="433" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Launch</text>

  <rect x="260" y="410" width="80" height="35" fill="url(#btnAdd)" rx="5"/>
  <text x="300" y="433" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Add</text>

  <rect x="360" y="410" width="80" height="35" fill="#313244" rx="5" stroke="#6c7086" stroke-width="1"/>
  <text x="400" y="433" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Edit</text>

  <rect x="460" y="410" width="80" height="35" fill="url(#btnDelete)" rx="5"/>
  <text x="500" y="433" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Delete</text>

  <rect x="560" y="410" width="80" height="35" fill="#313244" rx="5" stroke="#6c7086" stroke-width="1"/>
  <text x="600" y="433" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Quit</text>

  <!-- Status bar -->
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="12" fill="#6c7086" text-anchor="middle">Select model and press Enter or click Launch</text>

  <!-- Keyboard shortcuts hint -->
  <text x="400" y="490" font-family="Arial, sans-serif" font-size="11" fill="#45475a" text-anchor="middle">Opens in Windows Terminal tabs - Ctrl+Shift+T for new tab</text>
</svg>
